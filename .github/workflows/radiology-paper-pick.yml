name: Radiology Paper Pick

on:
  # 初期設定では自動実行されないようにコメントアウトしています。
  # 動作確認ができたら、以下の2行のコメント(#)を外すと、毎日日本時間 07:00 (JST) に自動実行されます。
  # schedule:
  #   - cron: '0 22 * * *'
  
  workflow_dispatch: # GitHubの画面から手動で実行するための設定

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: リポジトリのチェックアウト
      uses: actions/checkout@v3

    - name: Python のセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 依存関係のインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: スクリプトの実行
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        WP_USER: ${{ secrets.WP_USER }}
        WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
      run: python radiology_paper_pick.py
